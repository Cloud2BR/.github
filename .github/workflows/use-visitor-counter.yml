name: Update view counter

on:
  workflow_dispatch:
  # Optional: enable scheduled refreshes (requires TRAFFIC_TOKEN secret)
  # schedule:
  #   - cron: '0 0 * * 1' # Weekly (Mondays at 00:00 UTC)

permissions:
  contents: write
  pull-requests: write

jobs:
  update-view-counter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone view counter tool
        run: git clone --depth=1 https://github.com/brown9804/github-visitor-counter.git

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tool dependencies
        run: cd github-visitor-counter && npm ci

      - name: Generate badge and metrics
        run: node github-visitor-counter/update_repo_views_counter.js
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Move metrics.json to repo root
        run: mv github-visitor-counter/metrics.json metrics.json

      - name: Clean up tool directory
        run: rm -rf github-visitor-counter

      - name: Create pull request with updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update view counter"
          title: "Update view counter"
          body: "Automated update of view counter badge and metrics.json."
          branch: "automation/view-counter"
          delete-branch: true
          add-paths: |
            profile/README.md
            metrics.json
